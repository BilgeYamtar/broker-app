<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuk Portfoyu - App Icon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .label {
    color: #6b7280;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .icon {
    width: 1024px;
    height: 1024px;
    background: #0a1628;
    border-radius: 224px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Scaled-down preview sizes */
  .previews {
    display: flex;
    gap: 40px;
    align-items: end;
  }
  .preview-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* Anchor SVG styling */
  .anchor-svg {
    width: 52%;
    height: 52%;
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Full 1024x1024 icon -->
  <div class="label">1024 x 1024 — Screenshot this for App Store</div>
  <div class="icon">
    <svg class="anchor-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Anchor ring (top) -->
      <circle cx="100" cy="32" r="18" stroke="#2dd4a8" stroke-width="10" fill="none"/>
      <!-- Shaft -->
      <line x1="100" y1="50" x2="100" y2="170" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
      <!-- Crossbar -->
      <line x1="58" y1="88" x2="142" y2="88" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
      <!-- Left fluke -->
      <path d="M100 170 Q 42 170 42 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
      <!-- Right fluke -->
      <path d="M100 170 Q 158 170 158 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
      <!-- Left fluke arrowhead -->
      <line x1="42" y1="118" x2="42" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
      <line x1="42" y1="118" x2="52" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
      <!-- Right fluke arrowhead -->
      <line x1="158" y1="118" x2="158" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
      <line x1="158" y1="118" x2="148" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Preview sizes -->
  <div class="label">Preview at common sizes</div>
  <div class="previews">
    <div class="preview-item">
      <div class="icon" style="width:180px;height:180px;border-radius:40px;">
        <svg class="anchor-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="32" r="18" stroke="#2dd4a8" stroke-width="10" fill="none"/>
          <line x1="100" y1="50" x2="100" y2="170" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
          <line x1="58" y1="88" x2="142" y2="88" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
          <path d="M100 170 Q 42 170 42 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
          <path d="M100 170 Q 158 170 158 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
          <line x1="42" y1="118" x2="42" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="42" y1="118" x2="52" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="158" y1="118" x2="158" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="158" y1="118" x2="148" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="label">180px (@3x)</span>
    </div>
    <div class="preview-item">
      <div class="icon" style="width:120px;height:120px;border-radius:27px;">
        <svg class="anchor-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="32" r="18" stroke="#2dd4a8" stroke-width="10" fill="none"/>
          <line x1="100" y1="50" x2="100" y2="170" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
          <line x1="58" y1="88" x2="142" y2="88" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round"/>
          <path d="M100 170 Q 42 170 42 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
          <path d="M100 170 Q 158 170 158 118" stroke="#2dd4a8" stroke-width="10" stroke-linecap="round" fill="none"/>
          <line x1="42" y1="118" x2="42" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="42" y1="118" x2="52" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="158" y1="118" x2="158" y2="132" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
          <line x1="158" y1="118" x2="148" y2="126" stroke="#2dd4a8" stroke-width="8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="label">120px (@2x)</span>
    </div>
    <div class="preview-item">
      <div class="icon" style="width:60px;height:60px;border-radius:13px;">
        <svg class="anchor-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="32" r="18" stroke="#2dd4a8" stroke-width="12" fill="none"/>
          <line x1="100" y1="50" x2="100" y2="170" stroke="#2dd4a8" stroke-width="12" stroke-linecap="round"/>
          <line x1="58" y1="88" x2="142" y2="88" stroke="#2dd4a8" stroke-width="12" stroke-linecap="round"/>
          <path d="M100 170 Q 42 170 42 118" stroke="#2dd4a8" stroke-width="12" stroke-linecap="round" fill="none"/>
          <path d="M100 170 Q 158 170 158 118" stroke="#2dd4a8" stroke-width="12" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="label">60px (@1x)</span>
    </div>
  </div>
</div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#0a1628"/>

  <!-- Anchor symbol — minimal, geometric -->
  <g transform="translate(512, 512)" fill="none" stroke="#2dd4a8" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical shaft -->
    <line x1="0" y1="-260" x2="0" y2="260"/>

    <!-- Top ring -->
    <circle cx="0" cy="-310" r="50" fill="none"/>

    <!-- Crossbar -->
    <line x1="-140" y1="-120" x2="140" y2="-120"/>

    <!-- Curved flukes (bottom arms) -->
    <path d="M 0,260 Q -220,260 -220,80" fill="none"/>
    <path d="M 0,260 Q 220,260 220,80" fill="none"/>
  </g>
</svg>
